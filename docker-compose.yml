version: "3.9"
services:
  app:
    build: .
    ports:
    - "8080:8080"
    depends_on:
      - db
    environment:
      
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/taskdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    restart: always
  db:
    image: mysql:8
    container_name: task-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: taskdb
    ports:
      - "3307:3306"
    volumes:
    - db_data:/var/lib/mysql
    restart: always

volumes:
  db_data:
  